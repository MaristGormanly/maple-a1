@if (visible) {
<div class="dialog-overlay" role="dialog" aria-modal="true" (click)="cancelled.emit()">
  <div class="card dialog-panel" (click)="$event.stopPropagation()">
    <div class="card__head">
      <h3 class="card__title" style="font-size:18px">{{title}}</h3>
    </div>
    <div class="card__body">
      <p style="margin:0;color:var(--ink-2);font-size:14px">{{message}}</p>
    </div>
    <div class="card__foot" style="justify-content:flex-end;gap:8px">
      <button class="btn btn--ghost btn--sm" [disabled]="loading" (click)="cancelled.emit()">
        Cancel
      </button>
      <button class="btn btn--danger btn--sm" [disabled]="loading" (click)="confirmed.emit()">
        @if (loading) { Deleting… } @else { {{confirmLabel}} }
      </button>
    </div>
  </div>
</div>
}
