@if (criteriaScores.length > 0) {
  <div>
    <div class="section-title">
      Criteria scores
      <span class="section-title__count">{{criteriaScores.length}} rubric items</span>
    </div>

    @for (c of criteriaScores; track c.criterion_name) {
      <div class="criterion" [class.criterion--review]="isNeedsReview(c)">
        <div class="criterion__head">
          <div class="criterion__name">{{c.criterion_name}}</div>
          <div class="criterion__badges">
            <span class="criterion__score">{{c.score}}<small>/100</small></span>
            <span
              class="badge"
              [class.badge--green]="badgeTone(c.level) === 'green'"
              [class.badge--amber]="badgeTone(c.level) === 'amber'"
              [class.badge--red]="badgeTone(c.level) === 'red'"
              [class.badge--neutral]="badgeTone(c.level) === 'neutral'"
            >
              <span class="badge__dot"></span>{{levelLabel(c.level)}}
            </span>
          </div>
        </div>
        <p class="criterion__just">{{c.justification}}</p>
        <div class="conf-row">
          <span class="conf-row__label">Confidence</span>
          <div class="conf-track">
            <div
              class="conf-fill"
              [class.conf-fill--hi]="c.confidence >= 0.75"
              [class.conf-fill--mid]="c.confidence >= 0.5 && c.confidence < 0.75"
              [class.conf-fill--lo]="c.confidence < 0.5"
              [style.width.%]="confidencePct(c.confidence)"
            ></div>
          </div>
          <span class="conf-row__val">{{confidencePct(c.confidence)}}%</span>
        </div>
      </div>
    }
  </div>
}
