# MAPLE A1 — Example Nginx site configuration (sanitized)
#
# TEMPLATE ONLY. Adjust upstream port to match /opt/maple-a1/.env (APP_PORT) and
# systemd (maple-a1.service). Live TLS paths come from Certbot under
# /etc/letsencrypt/ — do not commit real hostnames or secrets.
#
# Typical install on the Droplet:
#   sudo cp /opt/maple-a1/docs/nginx/maple-a1.example.conf /etc/nginx/sites-available/maple-a1
#   sudo ln -sf /etc/nginx/sites-available/maple-a1 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ---------------------------------------------------------------------------
# A) IP-only reverse proxy (matches “Nginx IP-only” baseline in deployment.md)
# ---------------------------------------------------------------------------
upstream maple_a1_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://maple_a1_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}

