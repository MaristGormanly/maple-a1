services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: maple_a1
      POSTGRES_USER: maple_app
      POSTGRES_PASSWORD: maple_app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maple_app -d maple_a1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env.docker
    environment:
      DOCKER_HOST_PROJECT_ROOT: ${PWD}
      DOCKER_SOCKET_URL: unix:///var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/raw:/app/data/raw
      - ./data/cache:/app/data/cache
      - ./uploads/rubrics:/app/uploads/rubrics
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/code-eval/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    profiles:
      - tools

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
